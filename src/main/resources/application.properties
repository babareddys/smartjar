spring.application.name=smartjar-backend
server.port=9090

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/smartjar
spring.datasource.username=jaruser
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver
server.error.include-message=always

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:MyVeryLongAndSecureJwtSecretKeyForJarAppThatIsAtLeast256BitsLong!}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_SZ9IXx6o794MFQ}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:4IMJp3mCsUA0h36zOpqpEOsa}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:webhook_secret_change_me}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:vinaytechandgaming@gmail.com}
spring.mail.password=${MAIL_PASS:xjhzhqnsmkwihkua}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OTP
app.otp.expiry-minutes=10
app.otp.length=6

# Gold API
gold.api.url=${GOLD_API_URL:https://api.metalpriceapi.com/v1/latest}
gold.api.key=${GOLD_API_KEY:your_gold_api_key_here}
app.gold.cache-ttl-minutes=15

# Logging
logging.level.com.smartjar=INFO
logging.level.org.springframework.security=WARN

# Actuator — expose only /actuator/health publicly
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
